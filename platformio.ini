; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
	zinggjm/GxEPD2
	olikraus/U8g2_for_Adafruit_GFX
	bblanchon/ArduinoJson
	geekfactory/GeekFactory GFButton Library@^1.0.1
	wallysalami/QRCodeGFX@^1.0.0
	miguelbalboa/MFRC522
	256dpi/MQTT
monitor_speed = 115200

; A esp32-s3-devkitc-1 usa o USB nativo (sem chip CP2102/CH340) — sem
; ARDUINO_USB_CDC_ON_BOOT, o Serial nao sai pela porta USB e o monitor fica
; em silencio mesmo com o upload funcionando. O platformio.ini oficial da
; disciplina usa essa mesma flag para todos os ambientes.
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

; Reinicia a placa corretamente apos o upload (necessario com USB nativo).
board_upload.before_reset = usb_reset
